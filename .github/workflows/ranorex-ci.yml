name: Ranorex CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ranorex-test:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: |
          nuget.exe restore RanorexFramework.sln

      - name: Build solution
        run: |
          msbuild RanorexFramework.sln /p:Configuration=Debug

      - name: Debug output (check build artifacts)
        run: |
          Get-ChildItem RanorexFramework\bin\Debug -Recurse

      - name: Debug test files
        run: |
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter *.rxtst
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter *.exe

      - name: Run Ranorex Tests
        run: |
          $workspace = $env:GITHUB_WORKSPACE

          $suite = Join-Path $workspace "RanorexFramework\RanorexFramework.rxtst"

          $runner = Get-ChildItem $workspace -Recurse -Filter *.exe |
                    Where-Object { $_.Name -like "*RanorexFramework*.exe" } |
                    Select-Object -First 1

          if (!(Test-Path $suite)) {
              Write-Host "Suite NOT FOUND: $suite"
              exit 1
          }

          if (!$runner) {
              Write-Host "Runner EXE NOT FOUND"
              exit 1
          }

          & $runner.FullName $suite /reportfile="TestReport.rxlog.html"