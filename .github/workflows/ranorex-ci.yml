name: Ranorex CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ranorex-test:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: |
          nuget.exe restore RanorexFramework.sln

      - name: Build solution
        run: |
          msbuild RanorexFramework.sln /p:Configuration=Debug

      - name: Debug output (check build artifacts)
        run: |
          Get-ChildItem RanorexFramework\bin\Debug -Recurse

      - name: Debug test files
        run: |
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter *.rxtst
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter *.exe

      - name: Run Ranorex Tests
        run: |
          $workspace = $env:GITHUB_WORKSPACE

          $runner = Get-ChildItem $workspace -Recurse -Filter RanorexFramework.exe |
                    Where-Object { $_.FullName -like "*bin*Debug*" } |
                    Select-Object -First 1

          $suites = Get-ChildItem $workspace -Recurse -Filter *.rxtst |
                    Where-Object { $_.FullName -notlike "*bin*" }

          Start-Process "$workspace\RanorexFramework\Applications\RxDemoApp.exe"
          Start-Sleep -Seconds 5

          foreach ($suite in $suites) {
              Write-Host "=============================="
              Write-Host "Running suite: $($suite.FullName)"

              $report = "$workspace\TestReport_$($suite.BaseName).rxlog.html"

              & $runner.FullName $suite.FullName "/reportfile=$report"

              Write-Host "Report saved to: $report"
          }